<!DOCTYPE html>

<html class="light" lang="en"><head>

                        "surface-container-high": "#eae6f4",

                        "on-secondary": "#ffffff",

                        "on-tertiary-container": "#ffd4a4",
                        "primary-fixed": "#e2dfff",
                        "outline": "#777587",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f5f2ff",
                        "surface-dim": "#dcd8e5",

                        "on-tertiary-fixed": "#2a1700",
                        "error-container": "#ffdad6",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#f3effc",
                        "on-primary-fixed": "#0f0069",
                        "inverse-surface": "#302f39",
                        "tertiary-container": "#885500",
                        "inverse-primary": "#c3c0ff",
                        "on-primary-container": "#dad7ff",
                        "on-error": "#ffffff",
                        "surface-variant": "#e4e1ee",
                        "primary-container": "#4f46e5",
                        "on-secondary-fixed": "#002113",
                        "primary-fixed-dim": "#c3c0ff",
                        "surface-container-highest": "#e4e1ee",
                        "primary": "#3525cd",
                        "on-surface-variant": "#464555",
                        "on-tertiary-fixed-variant": "#653e00",
                        "on-background": "#1b1b24",
                        "secondary-fixed": "#6ffbbe",
                        "outline-variant": "#c7c4d8",
                        "on-secondary-fixed-variant": "#005236",
                        "tertiary": "#684000",
                        "background": "#fcf8ff",
                        "destructive": "#e11d48",
                        "warning-bg": "#fffbeb",

                        "warning-text": "#92400e"
                    },
                    "borderRadius": {
                        "DEFAULT": "6px",
                        "lg": "6px",
                        "xl": "12px",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "4px",
                        "density-medium": "12px",
                        "component-gap": "8px",
                        "gutter": "16px",
                        "density-high": "4px",
                        "container-padding": "24px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "body-sm": ["Inter"],
                        "label-sm": ["Inter"],
                        "display": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "label-md": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface overflow-hidden">
<!-- Background Dashboard Simulation ({{DATA:SCREEN:SCREEN_6}}) -->
<div class="fixed inset-0 z-0 grayscale-[0.5] opacity-40 blur-sm overflow-hidden select-none pointer-events-none">
<div class="h-full w-full bg-slate-50 flex">
<!-- Sidebar placeholder -->
<div class="w-[260px] h-full border-r border-outline-variant bg-white"></div>
<!-- Content area placeholder -->
<div class="flex-1 p-8 space-y-6">
<div class="h-10 w-64 bg-slate-200 rounded"></div>
<div class="grid grid-cols-4 gap-4">
<div class="h-32 bg-white border border-slate-200 rounded"></div>
<div class="h-32 bg-white border border-slate-200 rounded"></div>
<div class="h-32 bg-white border border-slate-200 rounded"></div>
<div class="h-32 bg-white border border-slate-200 rounded"></div>
</div>
<div class="h-96 bg-white border border-slate-200 rounded"></div>
</div>
</div>
</div>
<!-- Modal Backdrop -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
<!-- Modal Container -->
<div class="bg-surface-container-lowest w-full max-w-[480px] shadow-2xl rounded-lg border border-outline-variant overflow-hidden animate-in fade-in zoom-in duration-200">
<!-- Modal Header -->
<div class="px-gutter pt-gutter pb-density-medium">
<h2 class="font-headline-md text-headline-md text-on-surface">Reset Period</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Week: Jun 29 – Jul 5, 2026</p>
</div>
<!-- Modal Content -->
<div class="px-gutter pb-gutter space-y-4">
<!-- Warning Box -->
<div class="bg-warning-bg border border-warning-border p-density-medium rounded-lg flex gap-3">
<span class="material-symbols-outlined text-warning-text" style="font-size: 20px;">warning</span>
<p class="font-body-sm text-body-sm text-warning-text leading-tight">
                        Resetting this period will revert all finalized data. This action cannot be undone.
                    </p>
</div>
<!-- Impact Summary -->
<div class="space-y-2">
<p class="font-label-md text-label-md text-outline uppercase tracking-wider">Inventory Impact Summary</p>
<ul class="space-y-2">
<li class="flex items-center gap-3 py-1 border-b border-surface-container">
<span class="material-symbols-outlined text-on-surface-variant" style="font-size: 18px;">camera</span>
<span class="font-body-sm text-body-sm text-on-surface">2 finalized snapshots</span>
</li>
<li class="flex items-center gap-3 py-1 border-b border-surface-container">
<span class="material-symbols-outlined text-on-surface-variant" style="font-size: 18px;">receipt_long</span>
<span class="font-body-sm text-body-sm text-on-surface">14 settlement postings</span>
</li>
<li class="flex items-center gap-3 py-1">
<span class="material-symbols-outlined text-on-surface-variant" style="font-size: 18px;">payments</span>
<span class="font-body-sm text-body-sm text-on-surface">1 gap charge</span>
</li>
</ul>
</div>
<!-- Confirmation Input -->
<div class="space-y-2 pt-2">
<label class="font-label-md text-label-md text-on-surface-variant block" for="confirm-label">
                        Type the week label to confirm
                    </label>
<input class="w-full px-3 py-2 bg-white border border-outline-variant rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all font-body-sm text-body-sm" id="confirm-label" placeholder="Jun 29 – Jul 5, 2026" type="text"/>
</div>
</div>
<!-- Footer Actions -->
<div class="px-gutter py-density-medium bg-surface-container-low flex justify-end gap-3 items-center">
<button class="px-4 h-9 flex items-center justify-center font-label-md text-label-md text-on-surface-variant hover:text-on-surface transition-colors cursor-pointer rounded-lg">
                    Cancel
                </button>
<button class="px-4 h-9 flex items-center justify-center font-label-md text-label-md bg-destructive text-white rounded-lg hover:brightness-90 active:scale-95 transition-all shadow-sm" id="reset-button">
                    Reset Period
                </button>
</div>
</div>
</div>
<!-- Micro-interaction Script -->
<script>
        const input = document.getElementById('confirm-label');
        const resetButton = document.getElementById('reset-button');
        const confirmationString = "Jun 29 – Jul 5, 2026";

        // Initial state
        resetButton.style.opacity = "0.5";
        resetButton.style.pointerEvents = "none";

        input.addEventListener('input', (e) => {
            if (e.target.value === confirmationString) {
                resetButton.style.opacity = "1";
                resetButton.style.pointerEvents = "auto";
                resetButton.classList.add('animate-pulse');
                setTimeout(() => resetButton.classList.remove('animate-pulse'), 1000);
            } else {
                resetButton.style.opacity = "0.5";
                resetButton.style.pointerEvents = "none";
            }
        });

        resetButton.addEventListener('click', () => {
            resetButton.innerHTML = '<span class="material-symbols-outlined animate-spin mr-2">refresh</span>Processing...';
            setTimeout(() => {
                alert('Period successfully reset.');
                resetButton.innerHTML = 'Reset Period';
            }, 1500);
        });
    </script>
</body></html>
