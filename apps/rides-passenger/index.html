<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#006d43" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0&display=swap" rel="stylesheet" />
    <title>Roam Rides</title>
    <meta name="description" content="Book a ride with Roam." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      (function () {
        var key = 'roam-passenger-theme';
        var mode = 'light';
        try {
          var stored = localStorage.getItem(key);
          if (stored === 'light' || stored === 'dark' || stored === 'auto') mode = stored;
        } catch (e) {}
        var dark =
          mode === 'dark' ||
          (mode === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        var resolved = dark ? 'dark' : 'light';
        document.documentElement.dataset.theme = resolved;
        document.documentElement.dataset.themeMode = mode;
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
