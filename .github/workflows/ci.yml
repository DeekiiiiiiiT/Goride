name: CI

# Disabled for now - uncomment when ready for CI testing
# on:
#   push:
#     branches: [main]
#   pull_request:
#     branches: [main]
on: workflow_dispatch

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Configure pnpm
        run: pnpm config set onlyBuiltDependencies '["@tailwindcss/oxide", "esbuild"]'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
