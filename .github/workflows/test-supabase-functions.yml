# Runs the Deno-native test suites under supabase/functions/** (Deno.test + https: imports).
# These do NOT run via Vitest/pnpm build (apps/fleet/vite.config.ts explicitly excludes
# supabase/functions/** from its test include) and were never wired into any CI workflow
# before this file — ci.yml only runs `pnpm build`, and deploy-supabase-edge.yml only deploys.
#
# Non-blocking for now (continue-on-error): this is a new safety net, not a gate. Once this
# has run green for a while, drop continue-on-error to make it a required check.
# Mirrors ci.yml's convention of keeping automatic push/PR triggers commented out until the
# team is ready — uncomment the `pull_request`/`push` block below when ready to gate PRs.
name: Test Supabase Functions

# on:
#   pull_request:
#     paths:
#       - 'supabase/functions/**'
on: workflow_dispatch

jobs:
  deno-test:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Run Deno test suites
        run: |
          set -euo pipefail
          deno test --allow-env --allow-net --allow-read supabase/functions/
