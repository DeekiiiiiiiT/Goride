# Deploy Edge Functions when you push to `main` (e.g. Commit + Sync).
# Required repo secrets: SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF
#
# Supabase occasionally returns HTTP 502 while uploading function assets (--use-api).
# Each function is deployed with retries and a short backoff to ride out transient failures.
name: Deploy Supabase Edge Function

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-supabase-edge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pin CLI version — `latest` on setup-cli@v1 often 404s when GitHub release assets lag.
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.99.0

      - name: Deploy Edge Functions (retry on 5xx / network flakes)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -u
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN or SUPABASE_PROJECT_REF secrets."
            exit 1
          fi

          deploy_with_retry() {
            fn="$1"
            max=4
            n=0
            while [ "$n" -lt "$max" ]; do
              n=$((n+1))
              echo ">>> Deploying ${fn} (attempt ${n}/${max})..."
              if supabase functions deploy "$fn" --use-api --project-ref "$SUPABASE_PROJECT_REF"; then
                echo ">>> ${fn} OK"
                return 0
              fi
              if [ "$n" -lt "$max" ]; then
                echo ">>> ${fn} failed; waiting 45s before retry (502 during upload is often transient)..."
                sleep 45
              fi
            done
            echo ">>> ${fn} failed after ${max} attempts. Re-run the workflow or: supabase functions deploy ${fn} --use-api --project-ref <ref> --debug"
            return 1
          }

          deploy_with_retry make-server-37f42386
          deploy_with_retry delivery
          deploy_with_retry payments
          deploy_with_retry send-sms
          deploy_with_retry rides
