<!-- @dsCard group="Shared" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Driver Picker Combobox</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Inter',system-ui,sans-serif}</style>
</head>
<body class="bg-slate-50 text-slate-900 p-6 md:p-10">
  <div class="max-w-sm mx-auto space-y-4">
    <div>
      <label class="text-xs font-medium uppercase tracking-wider text-slate-500">Assign driver</label>
      <p class="text-xs text-slate-500 mb-2">Required to charge a driver — prevents claims against an unknown driver.</p>
      <!-- Trigger -->
      <button class="w-full h-10 rounded-md border border-slate-200 bg-white px-3 flex items-center justify-between text-sm text-slate-700 hover:bg-slate-50">
        <span class="flex items-center gap-2"><span class="inline-flex h-6 w-6 items-center justify-center rounded-full bg-indigo-100 text-indigo-700 text-xs font-semibold">MR</span>Marcus Reid</span>
        <span class="text-slate-400">▾</span>
      </button>
    </div>

    <!-- Open dropdown -->
    <div class="rounded-lg border border-slate-200 bg-white shadow-lg overflow-hidden">
      <div class="p-2 border-b border-slate-100">
        <input class="w-full h-9 rounded-md border border-slate-200 px-3 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100" placeholder="Search drivers…" value="ma">
      </div>
      <ul class="max-h-56 overflow-y-auto py-1 text-sm">
        <li class="flex items-center gap-2 px-3 py-2 bg-indigo-50 text-indigo-900 cursor-pointer">
          <span class="inline-flex h-6 w-6 items-center justify-center rounded-full bg-indigo-100 text-indigo-700 text-xs font-semibold">MR</span>Marcus Reid<span class="ml-auto text-indigo-600">✓</span>
        </li>
        <li class="flex items-center gap-2 px-3 py-2 hover:bg-slate-50 cursor-pointer">
          <span class="inline-flex h-6 w-6 items-center justify-center rounded-full bg-slate-100 text-slate-600 text-xs font-semibold">MA</span>Malcolm Anderson
        </li>
        <li class="flex items-center gap-2 px-3 py-2 hover:bg-slate-50 cursor-pointer">
          <span class="inline-flex h-6 w-6 items-center justify-center rounded-full bg-slate-100 text-slate-600 text-xs font-semibold">MG</span>Maria Grant
        </li>
      </ul>
    </div>
  </div>
</body>
</html>
