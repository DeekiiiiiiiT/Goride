<!-- @dsCard group="Admin" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Toll Automation Settings Card</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Inter',system-ui,sans-serif}</style>
</head>
<body class="bg-slate-50 text-slate-900 p-6 md:p-10">
  <div class="max-w-xl mx-auto rounded-lg border border-slate-200 bg-white shadow-sm">
    <div class="p-5 border-b border-slate-200">
      <h2 class="text-lg font-semibold text-slate-900">Toll Reconciliation Automation</h2>
      <p class="text-sm text-slate-500">Auto-resolve safe, high-confidence refunds. Everything else stays for admin review.</p>
    </div>
    <div class="p-5 space-y-5">
      <!-- Toggle -->
      <label class="flex items-center justify-between cursor-pointer">
        <div>
          <div class="text-sm font-medium text-slate-900">Enable refund auto-resolution</div>
          <div class="text-xs text-slate-500">Only integrity-safe cash-wash refunds are applied automatically.</div>
        </div>
        <span class="relative inline-flex h-6 w-11 items-center rounded-full bg-indigo-600">
          <span class="inline-block h-5 w-5 translate-x-5 rounded-full bg-white shadow transition"></span>
        </span>
      </label>

      <!-- Confidence threshold -->
      <div>
        <div class="flex items-center justify-between">
          <label class="text-sm font-medium text-slate-900">Confidence threshold</label>
          <span class="text-sm font-semibold text-indigo-700">85%</span>
        </div>
        <input type="range" min="50" max="100" value="85" class="w-full mt-2 accent-indigo-600">
        <p class="text-xs text-slate-500 mt-1">Suggestions below this score require manual review.</p>
      </div>

      <!-- Plaza coverage health -->
      <div class="rounded-lg border border-slate-200 bg-slate-50 p-4">
        <div class="flex items-center justify-between">
          <div class="text-sm font-medium text-slate-900">Plaza coverage health</div>
          <span class="inline-flex items-center rounded-full bg-emerald-100 px-2 py-0.5 text-xs font-semibold text-emerald-700">Healthy</span>
        </div>
        <div class="mt-3 grid grid-cols-3 gap-3 text-center">
          <div><div class="text-lg font-bold text-slate-900">14</div><div class="text-xs text-slate-500">Active plazas</div></div>
          <div><div class="text-lg font-bold text-amber-600">2</div><div class="text-xs text-slate-500">Missing rate</div></div>
          <div><div class="text-lg font-bold text-slate-900">100m</div><div class="text-xs text-slate-500">Default radius</div></div>
        </div>
      </div>
    </div>
    <div class="p-4 border-t border-slate-200 flex justify-end gap-2">
      <button class="h-9 rounded-md border border-slate-200 bg-white px-4 text-sm font-medium text-slate-700 hover:bg-slate-50">Cancel</button>
      <button class="h-9 rounded-md bg-indigo-600 px-4 text-sm font-medium text-white hover:bg-indigo-700">Save</button>
    </div>
  </div>
</body>
</html>
